name: CI

# Runs the test suite on every push and pull request to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests
        run: pytest api/test_main.py -v

      - name: Lint check (syntax)
        run: python -m compileall api/
